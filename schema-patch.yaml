# RIME LLM candidate rerank — example config
# Merge this into your schema.yaml

engine:
  processors:
    - lua_processor@*llm_context     # collect committed text
  filters:
    - lua_filter@*llm_rerank         # LLM rerank

# LLM rerank settings (all optional, defaults shown)
llm_rerank:
  code_pattern: "^[a-z]{4}$"        # regex: which codes trigger LLM
  min_tokens: 1                     # min context tokens to start (1 or 2)
  max_tokens: 4                     # max context tokens (1-20)
  max_candidates: 4                 # candidates to score in parallel (2-9)
  cpu_cores: 0                      # physical cores (0 = auto-detect)
  cpu_threads: 0                    # logical threads (0 = auto-detect)
